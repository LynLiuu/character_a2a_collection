# Seedcore 全局配置模板。复制为 config/config.yaml 并填入真实值。
# 本期只预留占位：占位 key 时 client 自动走 mock，可无 key 端到端跑通。
ark:
  api_key: "PLACEHOLDER_ARK_API_KEY"          # 可用环境变量 ARK_API_KEY 覆盖
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  # 逻辑模型名 -> 方舟 endpoint id (ep-xxxx)。上层只用逻辑名。
  endpoints:
    seed-default: "PLACEHOLDER_EP_DEFAULT"
    seed-lite: "PLACEHOLDER_EP_LITE"

defaults:
  model: "seed-default"
  temperature: 0.8
  max_tokens: 1024
  timeout_s: 30

trace:
  enabled: true
  dir: "traces"        # 可用环境变量 SEEDCORE_TRACE_DIR 覆盖
  console: true        # 是否同时打印可读树形日志
